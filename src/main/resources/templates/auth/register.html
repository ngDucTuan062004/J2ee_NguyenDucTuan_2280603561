<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-graduation-cap auth-icon"></i>
      <h2>Tạo tài khoản</h2>
      <p>Đăng ký để bắt đầu học tập</p>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" th:object="${student}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="mb-3">
        <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" th:field="*{username}" class="form-control"
                 th:classappend="${#fields.hasErrors('username') ? 'is-invalid' : ''}"
                 placeholder="Nhập username">
        </div>
        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('username')}"
             th:errors="*{username}"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" th:field="*{email}" class="form-control"
                 th:classappend="${#fields.hasErrors('email') ? 'is-invalid' : ''}"
                 placeholder="Nhập email">
        </div>
        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
      </div>
      <div class="mb-4">
        <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" th:field="*{password}" class="form-control"
                 th:classappend="${#fields.hasErrors('password') ? 'is-invalid' : ''}"
                 placeholder="Nhập mật khẩu">
        </div>
        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}"></div>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100">
        <i class="fas fa-user-plus me-2"></i>Đăng ký
      </button>
    </form>
    <p class="text-center mt-3 mb-0">
      Đã có tài khoản? <a th:href="@{/login}" class="text-accent">Đăng nhập</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
