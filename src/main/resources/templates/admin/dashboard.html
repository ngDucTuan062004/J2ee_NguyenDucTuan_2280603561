<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::head-extra}, ~{::main-content}, ~{::scripts})}">
<head>
    <title>Quản trị - EduPortal</title>
    <th:block th:fragment="head-extra"></th:block>
</head>
<body>
<main th:fragment="main-content">
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="section-title">Quản lý Học phần</h2>
      <a th:href="@{/admin/courses/new}" class="btn btn-primary-custom">
        <i class="fas fa-plus me-2"></i>Thêm học phần
      </a>
    </div>
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i>Lưu học phần thành công!
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show">
      <i class="fas fa-trash me-2"></i>Đã xóa học phần.
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="table-responsive admin-table-wrap">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Hình ảnh</th>
            <th>Tên học phần</th>
            <th>Tín chỉ</th>
            <th>Giảng viên</th>
            <th>Danh mục</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="course, stat : ${courses}">
            <td th:text="${stat.index + 1}"></td>
            <td>
             <td>
			<img th:src="${course.image != null and !course.image.isEmpty()} ? '/images/' + ${course.image} : @{/images/default-course.png}"
				class="admin-course-img" alt="img"
				style="width: 80px; height: 55px; object-fit: cover; border-radius: 6px;">
			</td>
            </td>
            <td class="fw-semibold" th:text="${course.name}"></td>
            <td><span class="badge bg-primary" th:text="${course.credits} + ' TC'"></span></td>
            <td th:text="${course.lecturer}"></td>
            <td th:text="${course.category != null ? course.category.name : '-'}"></td>
            <td>
              <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}"
                 class="btn btn-sm btn-outline-warning me-1">
                <i class="fas fa-edit"></i>
              </a>
              <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}"
                 class="btn btn-sm btn-outline-danger"
                 onclick="return confirm('Xác nhận xóa học phần này?')">
                <i class="fas fa-trash"></i>
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
