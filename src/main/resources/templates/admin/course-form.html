<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::head-extra}, ~{::main-content}, ~{::scripts})}">
<head>
    <title>Thêm/Sửa học phần - EduPortal</title>
    <th:block th:fragment="head-extra"></th:block>
</head>
<body>
<main th:fragment="main-content">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="form-card">
          <h3 class="form-card-title">
            <i class="fas fa-book-open me-2"></i>
            <span th:text="${course.id != null ? 'Chỉnh sửa học phần' : 'Thêm học phần mới'}"></span>
          </h3>
          <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
          <form th:action="@{/admin/courses/save}" method="post" th:object="${course}"
                enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{image}" id="existingImage">
            <div class="mb-3">
              <label class="form-label">Tên học phần <span class="text-danger">*</span></label>
              <input type="text" th:field="*{name}" class="form-control"
                     th:classappend="${#fields.hasErrors('name') ? 'is-invalid' : ''}"
                     placeholder="Nhập tên học phần">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Số tín chỉ <span class="text-danger">*</span></label>
                <input type="number" th:field="*{credits}" class="form-control"
                       th:classappend="${#fields.hasErrors('credits') ? 'is-invalid' : ''}"
                       min="1" max="10">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('credits')}" th:errors="*{credits}"></div>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Danh mục</label>
                <select th:field="*{category.id}" class="form-select">
                  <option value="">-- Chọn danh mục --</option>
                  <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Giảng viên <span class="text-danger">*</span></label>
              <input type="text" th:field="*{lecturer}" class="form-control"
                     th:classappend="${#fields.hasErrors('lecturer') ? 'is-invalid' : ''}"
                     placeholder="Tên giảng viên">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('lecturer')}" th:errors="*{lecturer}"></div>
            </div>
            <div class="mb-4">
              <label class="form-label">Hình ảnh minh họa</label>
              <input type="file" name="imageFile" class="form-control" accept="image/*">
              <div th:if="${course.image != null}" class="mt-2">
                <small class="text-muted">Ảnh hiện tại:</small><br>
                <img th:src="${course.image}" style="max-height:80px;border-radius:8px;" alt="current">
              </div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary-custom">
                <i class="fas fa-save me-1"></i>Lưu học phần
              </button>
              <a th:href="@{/admin}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i>Quay lại
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
