<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-graduation-cap auth-icon"></i>
      <h2>EduPortal</h2>
      <p>Đăng nhập vào tài khoản của bạn</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
      <i class="fas fa-exclamation-triangle me-2"></i>Tên đăng nhập hoặc mật khẩu không đúng!
    </div>
    <div th:if="${param.logout}" class="alert alert-info">
      <i class="fas fa-check me-2"></i>Bạn đã đăng xuất thành công.
    </div>
    <div th:if="${param.registered}" class="alert alert-success">
      <i class="fas fa-check-circle me-2"></i>Đăng ký thành công! Hãy đăng nhập.
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="mb-3">
        <label class="form-label">Tên đăng nhập</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Mật khẩu</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 mb-3">
        <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
      </button>
    </form>

    <div class="divider"><span>hoặc</span></div>

    <!-- OAuth2 Google -->
    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google w-100 mb-3">
      <i class="fab fa-google me-2"></i>Đăng nhập bằng Google
    </a>

    <p class="text-center mt-3 mb-0">
      Chưa có tài khoản? <a th:href="@{/register}" class="text-accent">Đăng ký ngay</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
